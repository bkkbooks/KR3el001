酒醒則藥力已退即為麻汁藥雞鳴散治一切損傷血積疼痛難忍一兩大黃七粒桃五錢歸尾不相饒細酒煎來雞鳴服所有瘀血即時消傷元活血湯從高墜下脅肋痛楚難禁不省人事者用此活血花粉草柴胡大黃川甲與當歸紅花桃仁為細末小酒煎來敗血催大承湯跌撲瘀血深入臟腑昏沉不省者用此大承枳殼大黃硝蘇木紅花厚朴草木通當歸與陳皮水煎服之果為寶調中二陳湯行過宜服此藥調理補養理中陳腹半夏苓芎歸防芍草耆芩檳桔二和青紅花蘇木紫蘇木香烏奪命丹奪命丹內朴硝黃蘇木歸尾甘草良陳皮肉桂紅花等殼通乳沒共煎嗜活血通氣湯活血通氣青陳芍木香乳沒歸芎索紅花丹參並桂枝便酒同煎治跌磕跌打損傷危甚者用此乳香沒藥紅花各一錢土鱉蟲七個共為末重者一錢輕者五分陳酒送下出汗為度若金器重傷後或手足接骱後筋骨雖愈而不能伸屈者當用自然銅燜醋煅淬十次亦用陳酒送下隨量飲可也若不能伸曲者飲服後能徐徐伸曲也藥酒方紅花當歸生地續斷秦艽蘇木五加皮桃仁廣皮烏藥米仁虎骨蘇梗杜仲牛膝地骨皮各五錢加廣木香三錢好酒十斤浸
