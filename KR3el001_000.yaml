body:
  text: 論跌治法凡人在高處跌下俗名倒栽蔥天靈蓋未破者可救如穿者三魂已散七魄全無神不歸位呼吸雖有是候死之症也治法灸丹田穴凡仰天跌下背脊骨斷者其人坐臥不寧雖然勢重其神不散急宜治之無妨若過七日而醫治則難以救之必喪黃泉也其治法必用空屋一間上有著力之處將帶懸之梁上以人扶起患者倒背將兩條腳帶從兩脅兜轉腳帶在臂上兜起懸空吊之前用兩條後用兩條即將人吊起其人自直用海板一塊長三尺許放於背上又另將腳帶胸前綁一道腰下綁一道內綁一道共三道連人帶板而綁其人一吊自直而就板綁之其直非常輕輕放下仰天而臥不可搖動用藥七服七日後輕輕將腳帶放下其板則不可去再用七日輕輕抽去板二十一日方可搖動其腰脊自接上也再以別藥以去其傷而並補之為妙僕心跌去有跌斷胸膀骨者即攙起仰臥不用動手即用接骨丹七服其骨自接不拘服藥其骨不斷者只用七釐散三服不拘服別藥而愈凡跌斷肋骨不用動手照前法而治之先以膏藥貼患處即用行傷打藥去盡瘀血後服接骨丹七服其骨凸出照後用藥酒去傷一月而愈凡頂骨跌斷而陷下者用鮮虎脂四兩川芎五錢酒煎服凡打碎頂門不可用草藥恐其潰爛宜用止血散摻之次服上部末藥凡食喉傷者不治傷氣喉者先用銀絲縫好外用草藥敷之日換二次候其皮肉併合方用生肌散外貼膏藥服上部末藥湯凡人腸出者用麻油以青布搭上候軟先用手托住腸子令人含水一口默向患人面上一噴其人一驚其腸自入用銀絲縫好外敷草藥內服中部末藥湯一法腸出者用原酒釀數斤以布浸透將布搭於腸上看腸上之布微微熱氣即泡熱薑湯與患人服下薑湯入處即能收進湯力行到其腸即收完矣若腸穿者可用鮮桑白皮打線縫好其肚上破處亦以此法縫之外以血竭末敷上自愈此法秘傳凡人指斷者須湊上用水蠟燭內膜包裹待內骨接上方用生肌散以膏藥貼之凡人身初跌損血出用草藥先內服上部末藥加接骨丹三分同服下凡中部初跌損先服中部末藥加接骨丹五分輕者七日後服煎藥重者二七日後服煎藥凡下身初跌損治法同中部服下部末藥凡人偶然閃挫損傷不拘周身上下各宜自裁治服或敷或貼或服藥等類如重者加接骨丹三分輕者則不可用也論鬥毆穴道凡鬥毆周身穴道難以盡述特纂其要智者當深察之不可忽也霸王開鎖一拳即咽喉下是也若悶者即在腦後百勞上一寸左手襯在穴上用右手不論輕重連打數下即醒如不醒激用艾灸之其穴在腦骨下一寸五分以麝香連灸四五次而醒即用順氣散如不醒則無救矣或灸丹田穴封喉在霸王開鎖下三寸用手橫打外去者是也如悶者在霸王開鎖穴下半寸用左手叉住頸項右手扳住頭往後一扳即醒後用順氣散兩氣眼在隔孔上下後氣眼照前氣眼是也打上氣眼悶倒者照前手襯打後氣眼打後氣眼還拳即打前氣眼打前上氣眼即打後下氣眼打後上氣眼即打前下氣眼若打左邊須打右邊若打右邊須打左邊若不醒照前法灸肩井穴醒後服順氣散打血海其穴往上第八根肋骨空所為下血海也第十根肋骨空所為中血海腋窩中間為上血海也若打下血海輕者三年死重者一年死再重者三月死打中血海輕者一年死重者半年死再重者兩月死打上血海輕者一月死重者五日死再重者即死其穴不拘上下左右打傷俱要吐鮮血而死急宜治之無妨即用行傷打藥行血十三味一帖為上後用歸血入筋藥若遲之則無救矣打霍肺其穴在下氣眼傍一寸是也內空而外實若拳打重者打進肋骨不拘幾根亦用十三味藥一帖後用接骨丹其骨自然凸出再用行藥補藥亦可肋骨不斷者亦用十三味一帖後用補肺丸為妙人參五錢白芍五錢厚朴五錢前胡一兩以上研為細末蜜丸如綠豆大每服一錢空心白滾水下行血歸經散打血海者用橘紅牛膝荊芥各五錢防己生地五加皮各一兩甘草川芎桔梗各三錢當歸四錢順氣散陳皮木香厚朴前胡神麯炒生地川芎石菖蒲五加皮白豆蔻杜仲鹽水炒以上各五錢共為細末每服一錢好酒送下掃腸丸打盤腸者用蘇木木通皂礬火煅五加皮各一兩紅花澤瀉前胡各五錢當歸三錢核桃肉半斤以上共為細末為丸如桐子大每服二十丸陳酒送下如大便出糞黑者不妨護心七釐散打翻肚並黑虎透心者用大凡打重者宜先服此藥一服接骨蟲不拘多少入壇內餓二日洗淨入酒釀內醉死曬乾為末備用鬧羊花不拘多少用燒酒浸透曬乾用人參桔梗棗仁甘草黃耆以上各等分為細末肥壯者每服三分瘦弱者每服二分酒沖臨臥時服下切宜避風十三味行藥方不拘重傷凡有瘀血者俱宜用紅花桃仁蘇木當歸松節五加皮骨碎補牛膝枳殼木通澤瀉前胡大生軍通草水煎空心服如行過以米粥湯補之如灸後則血熱可加黃柏加減地黃丸人參熟地猴姜當歸棗仁茯苓山藥枸杞杜仲牛膝生地山萸杏仁川斷破故紙共為末蜜丸桐子大每服三錢早晚白湯送下接骨奪命丹如死有微氣者灌入可治自然銅古老錢各醋煅七次各三錢地鱉蟲五錢黃麻根燒灰三錢大黃酒煎五錢桃仁當歸尾紅花各一錢骨碎補去毛酒蒸乳香沒藥血竭兒茶硃砂雄黃各三錢麝香五分共為細末入瓷瓶內以蠟封好勿令泄氣遇症有微氣者即用此藥元酒釀送下即活連進數服即愈接骨丹小拳雞一隻干拔去毛搗爛入官桂末再搗勻敷骨斷處一周時其骨接上矣即去之如時間過長恐生多骨而長出接骨丹作接骨膏亦可雞一隻去淨肉將全身骨酥油炙為末每服三錢酒送下又骨末三錢取熱雞血調敷患處再以生雞皮綁縛經一周時即去之接骨膏血餘胡椒百草霜虎骨各一錢麝香五釐共為末糯米煮粥搗勻敷患處若加生地地鱉蟲更妙黎洞丸牛黃三分大黃一錢天竺黃二錢雄黃一錢藤黃三分銅絲打燈火上燒鬱金二分人言二分白三七二錢唐魏一錢兒茶三錢共為末蜜丸每丸六分藏固聽用老人服一分壯者三分弱者二分幼小者一分女人壯者二分幼小者服一分四骨散治跌打損傷之後筋骨疼痛不能伸縮者雞骨節虎骨節犬骨節龍骨共為細末入下部末藥內服後用寬筋湯地龍散治夾打不痛並治筋骨疼痛地龍去淨土酒炒五分桑寄生一錢乳香沒藥去油各一分牛膝紅花木香各二錢歸尾羌活各二錢五分以上共為細末每服一錢熱酒送下趁痛丸治跌僕損傷及走注歷節諸風軟風疼痛等症草烏去皮臍一兩熟地或生地亦可南星半夏曲白僵蟲烏藥各五錢並曬乾為末酒糊為丸桐子大每服七丸空心日午臨臥溫酒送下如傷損處薑汁和酒研十丸塗患處猝中倒者薑汁青茶研化七丸灌下即醒若加地龍血竭尤妙閃腰挫氣方不拘年月淺深一服即效歸身羌活蠍尾骨碎補劉寄奴紅花莪朮沒藥研去油沖服赤芍丹皮澤蘭牛膝各一錢生地二錢甘草五錢桃仁一錢酒煎服取汗忌油煎發物論治法凡跌打損傷跌僕男人傷上部易治下部難療以氣上升故也女人傷下部者易治上部難療以血下降故也凡傷須驗在何處按其受傷深淺明其受毒久新男子氣從左轉屬陽女於血從右轉屬陰須辨明氣血之分為最要傷前體者死速傷背肩者死緩傷左邊者氣促面黃浮腫傷右邊者氣促而面少血其死症痰多者死眼白者死唇吊者死失枕者死糞者死口臭者死斜睹者死氣響者死喘急胸高者死耳鼻赤急者死飲食不進者皆屬死症也續筋方先將斷筋湊好相對用旋覆花汁塗之仍用搽敷包好取箭頭入骨肉方用巴豆蜣螂同搗敷之少頃發癢可取用藥歌阿膠兮女人聖藥藕節吐血之良方炒蒲黃嘔血可用骨斷兮須求土鱉薑黃破血能止血瘀血賴丹皮蘇木大黃便閉而可行生地黃善生新血破風不醒豨薟一味跌打後忌薑蔥麻油瘡不斂象皮血竭古錢三七為仙藥延胡索號曰神品無差手損兮桂枝急用瘀血在腸桃歸鬚下散腫兮荊芥為美止痛兮滴乳堪誇頭頂引以川芎足損須用牛膝補血止血兮猴姜消血積三稜莪朮理腰傷兮炒杜仲旋覆花續斷療筋見腫消能除青腫橄欖灰止血尤良柿霜餅血流者無殃烏藥二香順氣之良金刀澤蘭跌僕無雙後人若問作歌者卻是漢庭張子房脈診凡欲識跌打重傷死生必先察其六脈起者生遲細者生洪大者死堅強者生小弱者死大者二十日死若命脈和緩關脈實雖傷重不妨命脈虛促雖輕亦死辨生死凡跌打傷有不治者五不知痛癢兼發戰者一不治也天柱骨折及太陽二穴傷者二不治也小腹帶斷心傷破陰囊穿者三不治也傷食喉四不治也汗出如油盡力叫喊者五不治也凡人手足俱有兩脛若一脛斷者可治兩脛俱斷者則不治大抵骨碎與斷要看明傷處平正如何凡骨低是骨不曾傷左右再看方知傷處先須拔捺端正方用外藥凡認傷處則骨頭平正便見左右損處則相度骨縫仔細捻捺骨歸舊處頂門雖破骨未入內可治凡耳後受傷不治食飽受傷三日不死可治心胸緊痛青色未裹心此乃偏心受傷可治凡男子兩乳受傷可治宜急救之若女人則不治腹內受傷吐糞者不治凡氣出而不收兼眼不閉者不治凡腎子受傷入腹者不治正皮破未入腹者可治正心口青腫者不治挾脊斷者亦不治之症也拔捺法凡手腕出骱者醫人用左手仰掌托捻被傷手臂又用右手在下節手近處骱一把拿定不可讓其退縮盡力一扯即入故位方服接骨丹仍貼膏藥凡肩臂脫骱者令患者低處坐定自用兩手叉定抱膝上將膝借力一扯視其臂隨手直前輕輕放兩手就入骱方服接骨丹仍貼膏藥凡肩胛骨出用椅當圈住脅又用軟衣棉被鋪好再令人捉住兩手伸卻墜下手腕絹布縛之凡肩井骨在脅下有損不可夾縛須捺平正妥貼以黑龍散敷絹布包好脅骨亦如此凡手骨出須看如何出若骨向左者須向右捺入骨若向右則向左邊捺入凡腦骨碎輕輕用手捺平正若不破用烏龍散若破則用桃花散填口以絹包之不可著風水犯之則破傷風倘在發內宜剪去發敷藥凡跨骨從臀上出可用人挺定援伸方用足捺入若跨骨從襠內出則不可治矣凡傷重者大概要拔伸捺正或取開捺正然後用桃花散黑龍散再夾縛大抵拔伸要近處不可覆在第二節骨上凡拔伸全要相度左右骨如何出或當正拔伸者或當斜拔者凡拔伸或用一人或用三人要看傷勢輕重難易如何修整法凡骨跌折又出肉外折處兩頭必如鋒刀或長短不齊不能復入用麻藥麻定方用銼之或用小鋸鋸齊然後按入方用敷藥及膏外加棉紙數層再以粉板夾好過一二日換膏藥日進接骨丹兩服若遇熱天用清茶洗淨勿令阻氣若脛骨別出在內者難治在外者用手法推入舊處方服藥凡跌打腫處患者不肯令人著手摸者又腫硬難辨肉內骨之碎否必須以麻藥服之然後用手捻其腫處如骨肉有聲即是骨碎以刀割開如有血出再用止血散並麻藥麻住然後取出碎骨以別骨補好膏藥貼之外用油紙包好與淡鹽湯一杯服之待醒後再服接骨丹藥凡陰子跌出有血者先用桃仁散止血以線縫好再以膏貼之傷一月內尚可正理久則難治夾縛法凡夾縛夏二日冬四五日解開用溫水洗去舊藥洗時不可驚動傷處仍用黑龍散敷凡平處骨碎皮不破可用黑龍散貼敷夾縛若曲折處其勢不可夾縛恐愈後不能伸曲可用黑龍散敷貼以便曲伸凡跌破以末藥敷口又用傘紙包好再用杉木皮縛定凡夾縛用杉木皮如指闊四邊排勻方用繩紮緊三五道宜粗如縛指須用苧麻若杉木皮用尿浸過方用凡腳膝蓋骨乃另生者