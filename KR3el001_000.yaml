front:
  text: 序體仁子曰是書何謂而秘稱禁書蓋緣外無獨秘故以禁書名之也非秘而不行之也所緣元胡久穢中土我朝太祖高皇帝愛念民生平胡滅虜掃蕩膻腥惟是諸臣不但恐懼所向無前然當破釜焚舟之後未免瘡痍困苦我太祖臨戎則心苦有切膚之痛故恆破錢糧鉅萬招致方外名人及諸奇醫並求接骨出鏃內傷跌僕金瘡種種異術遍尋起死回生之妙訣不待言而心懇切矣又擇選經驗者錄出成帙藏之禁中以為國家征伐鬥戰之備用時青田先生與聞國家大事君臣魚水而得禁藏於家予乃與裔孫松石翁交好數十年一日偶談岐黃之學因嘆青囊秘方不得復見於時翁云吾祖有禁方一冊等閒不以示人用之輒獲奇驗乃出是書授予視之書雖不多然皆出於岐黃外別傳秘方奇法非時醫所能覷其藩離者也予何幸而得之謹當世世寶之勿替也恐後之子孫不知或有遺棄之者故特序其所出之源流雲耳時宣德二年小春望日謹序
